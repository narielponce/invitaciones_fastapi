<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba de Iconos de Font Awesome</title>
    <!-- El mismo enlace CDN que usamos en el proyecto -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        body { font-size: 2rem; text-align: center; padding: 2rem; font-family: sans-serif; }
        div { margin-top: 2rem; }
    </style>
</head>
<body>
    <h1>Prueba de Iconos</h1>
    
    <div>
        <i class="fas fa-calendar-alt"></i>
        <i class="fas fa-clock"></i>
        <i class="fas fa-tshirt"></i>
        <i class="fas fa-gift"></i>
        <i class="fab fa-instagram"></i>
    </div>

    <hr>
    
    <p style="font-size: 1rem;">Si ves 5 iconos arriba, el CDN funciona y el problema está en el proyecto de Vue.</p>
    <p style="font-size: 1rem;">Si ves cuadrados vacíos, algo en tu navegador o red (como un AdBlocker) está bloqueando el CDN.</p>

</body>
</html>
